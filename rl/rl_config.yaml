drone:
  # Default namespace for single-env mode; first entry of `namespaces` is used
  # if present.
  namespace: drone0
  # Used by the swarm vec env. Add or remove entries to match the running sim
  # (e.g. ./launch_as2.bash -m spawns drone0/drone1/drone2 from world_swarm.yaml).
  namespaces: [drone0, drone1, drone2, drone3, drone4, drone5, drone6, drone7,
               drone8, drone9]
  use_sim_time: true
  spin_rate_hz: 500.0

control_hz: 100.0     # Hz. Each env step represents 1/control_hz of sim
                      # time (the pause-physics trick decouples this from
                      # wall time, so Python overhead doesn't pollute the
                      # per-step dynamics window). At 100 Hz the rates-mode
                      # inner loop matches the platform's cmd_freq / sim
                      # control_freq, halving attitude-error latency vs 50
                      # Hz. Several params downstream are step-counted
                      # rather than time-counted and so must scale with
                      # this: episode.max_steps, every per-step reward
                      # weight in `reward:`, and on the PPO side `gamma`
                      # and `sde_sample_freq` in train.py.
takeoff_height: 1.5
takeoff_speed: 1.0

# Deployment PnP camera geometry. Modeled as fixed, pitched `pitch_deg`
# forward/UP from body +x (FPV-style uptilt: optical axis = [cos, 0, +sin]).
# Drives the full-3D camera pointing — the camera-frame azimuth/elevation
# obs channels (obs[6]/[7]) and the roll-invariant off-axis "look at the
# gate" pointing penalty — so any roll/pitch/yaw that aims the camera at the
# gate is credited (a banked attitude pointing at the gate scores as well as
# a level one). With uptilt, pitching nose-down to fly fast also rotates the
# camera toward a level gate ahead, so speed and camera-aim reinforce.
camera:
  pitch_deg: 30.0

training:
  # Vectorized env backend: "subproc" runs one DroneGoalEnv per subprocess
  # (true parallelism, recommended for >2 drones). "dummy" runs all envs in
  # the main process; lower setup cost, simpler stack traces, but serializes
  # under the GIL.
  vec_env: subproc
  # Base ROS_DOMAIN_ID for per-drone DDS isolation. When set, drone i runs
  # on `base + i`; must match the value passed to launch_as2.bash -d.
  # Set to null (or omit) to leave ROS_DOMAIN_ID alone (single shared domain).
  base_ros_domain_id: 0

action:
  # Selects how the 4-D policy action is interpreted.
  #   "speed" → action = [vx, vy, vz, yaw_rate]  (body-frame velocity + yaw
  #             rate). Goes through the AS2 motion controller. Original mode.
  #   "rates" → action = [roll_rate, pitch_rate, yaw_rate, thrust]. Bypasses
  #             the motion controller and publishes directly to the
  #             platform's actuator_command/{thrust,twist} topics. The PID
  #             controller in this stack doesn't accept ACRO as input, so
  #             the direct-publish route is the only one that works without
  #             rebuilding the controller. NOTE: action semantics are
  #             completely different — a speed-mode checkpoint cannot be
  #             loaded in rates mode and vice versa.
  mode: rates
  v_max: 20.0           # m/s. In speed mode: per-axis action scale.
                        # In rates mode: still used for velocity-obs tanh
                        # scale and reward terms (k_speed, k_vertical,
                        # omni_speed_score). 20 m/s is a realistic upper
                        # bound for rates-mode drone speeds; raising it
                        # stretches the tanh's "fast vs cruise" boundary
                        # and the speed-bonus saturation point.
  yaw_rate_max: 3.0  # rad/s (= pi) (speed mode only)
  rates:                # used only when mode == "rates"
    roll_rate_max:  12.0   # rad/s, per-axis body-rate limit
    pitch_rate_max: 12.0
    yaw_rate_max:   12.0
    # Thrust in Newtons. Hover thrust for the 1 kg UAV is ~9.81 N; the
    # multirotor model in uav_config.yaml puts the per-motor saturation
    # at ~9.2 N (= 4 × 9.2 ≈ 37 N total max).
    #
    # Action mapping is HOVER-CENTERED, piecewise linear:
    #   action[3] = -1  → thrust_min   (max descent / cut motors)
    #   action[3] =  0  → thrust_hover (drone hangs in place)
    #   action[3] = +1  → thrust_max   (max climb)
    # So a freshly-initialized policy outputting ~0 on every dimension
    # actually hovers instead of climbing (which would happen if we used
    # the linear midpoint of [thrust_min, thrust_max]).
    thrust_min:    0.0    # N
    thrust_hover:  9.94   # N — set to vehicle_mass · g for the UAV in
                          # uav_config.yaml. If you change the mass there,
                          # re-tune this so action[3]=0 actually hovers.
    thrust_max:   40.0    # N


# Episode terminates if drone leaves this box.
# workspace:
#   # NOTE: only used to derive observation normalization divisors (max_dist_xy,
#   # pos_max_z). The OOB check uses `oob_box` below (symmetric half-extents
#   # around the *current* target).
#   x_min: -15.0
#   x_max:  15.0
#   y_min: -15.0
#   y_max:  15.0
#   z_min:  -4.0
#   z_max:  4.0

# OOB half-extents around the current (runtime) target. Drone is OOB when
# |drone − target|_axis exceeds the corresponding extent. Symmetric — there's
# no "above/below" asymmetry to think about even when the target is far from
# its config position (e.g. multi-gate test_track at z=4).
oob_box:
  x: 11.0
  y: 11.0
  z:  3.0

# Fallback (single) target pose for evaluation / fixed-target runs. Used by
# the env when `target_bounds` is absent. yaw is the desired final orientation
# of the drone at the goal (mirrors the gate yaw in the ROS1 setup).
target:
  x: 0.0
  y: 0.0
  z: 4.0
  yaw: 0.0

# Per-reset target sampling. Position is pinned at the origin so multi-drone
# DDS-isolated training renders cleanly (each drone's gate sits at the same
# world point), but yaw is fully randomized in [-π, π]. Yaw randomization
# used to be load-bearing so the policy would learn to use the obs[6] yaw-
# alignment channel as a *relative* signal instead of memorising the world
# heading. obs[6] is now bearing-to-target (target's angle in body frame)
# rather than yaw alignment, so the randomization is no longer required
# for that reason — but it's still useful to keep target_yaw varied so the
# back-entry geometry check (gate "front" side) doesn't always face the
# same world direction. Delete the whole block to revert to the fixed
# `target` above (zero randomization).
target_bounds:
  x_min: 0.0
  x_max: 0.0
  y_min: 0.0
  y_max: 0.0
  z_min: 4.0
  z_max: 4.0
  yaw_min: -3.14159265
  yaw_max:  3.14159265

# Per-reset drone spawn box, expressed as OFFSETS from the current target
# pose. So e.g. x_min: -5 means "spawn the drone up to 5 m -x of target".
# z bounds are symmetric (small) so the drone stays inside the absolute
# workspace.z window regardless of where target.z lands.
init_bounds:
  x_min: -9.0
  x_max:  9.0
  y_min: -9.0
  y_max:  9.0
  z_min:  -2.5
  z_max:  2.5
min_init_target_dist: 2.0  # m, in absolute world units

# Exploring starts: randomize the drone's initial velocity and attitude at
# each reset so the policy is forced to experience (and learn to control)
# aggressive high-speed / high-tilt regimes from step 0, instead of always
# starting from a gentle hover and overfitting to conservative maneuvers.
# The drone's roll/pitch are visible in obs[9..10] (rates mode) and its
# velocity in obs[3..5], so the policy can react. Set any *_max to 0 to
# disable that axis; delete the whole block to spawn at rest & level (the
# original behavior). Only used in rates mode in practice (speed mode's
# motion controller would damp these out immediately).
exploring_starts:
  lin_vel_max: 0.0   # m/s; initial speed ∈ [0, lin_vel_max], random
                      # isotropic direction (world frame), then per-axis
                      # capped by OOB margin (see min_reaction_time).
  tilt_max:     0.0   # rad (~34°); initial roll AND pitch each ∈ [−t, +t]
  ang_vel_max:  0.0   # rad/s; initial body angular velocity per axis ∈ [−a, +a]
  min_reaction_time: 0.5  # s. Cap each injected velocity component so the
                      # drone keeps at least this long before crossing the
                      # nearest OOB face on that axis, given its spawn
                      # position. Removes unfair "launched out of bounds at
                      # the boundary edge before it can recover" spawns
                      # without trimming inward/tangential velocity. Set 0
                      # to disable the cap (raw isotropic velocity).

reward:
  # All weights act on values pre-normalized to [0, 1]. Per-step weights
  # were halved when control_hz went 50 → 100: an episode now contains 2×
  # as many steps, so the same per-step weights would double the total
  # per-episode shaping reward and shift the per-step-vs-terminal balance
  # away from the success bonus. Halving keeps the per-episode reward
  # scale unchanged. Terminal-event rewards (success/oob/crash) are NOT
  # rescaled — they fire once per episode regardless of step rate.
  k_pos: 0.005           # distance penalty (xy)
  k_height: 0.01        # height penalty (|z|)
  k_bearing: 0.03        # "look at the gate" pointing penalty:
                         # − k_bearing · pointing_norm,
                         # where pointing_norm = (camera off-axis angle)/π —
                         # the roll-INVARIANT 3D angle between the PnP camera
                         # optical axis and the line-of-sight to the gate
                         # (full attitude). Any roll/pitch/yaw that centers
                         # the gate in frame scores well. Applied at FULL
                         # strength for the whole episode (no distance fade),
                         # so the policy keeps the gate centered all the way
                         # to and through the crossing. 0.03 is a meaningful
                         # fraction of the dense progress reward (~0.1/step).
  k_yaw_align: 0.0       # was 0.005. Disabled: the new objective is
                         # "reach the gate fast, regardless of body
                         # orientation", so we don't penalise yaw
                         # misalignment along the way.
  k_speed: 0.0           # was 0.001. Disabled: rewarding forward body
                         # velocity was pushing the policy toward an
                         # "align then accelerate" strategy. We now want
                         # the policy to pick its own approach style.
  k_vertical: 0.0      # penalty on vertical speed: − k_vertical · |vz_body|/v_max
  # Dense progress reward: + k_progress · (prev_dist − curr_dist) meters
  # (3D) each step. Gives the policy a strong dense gradient toward the gate
  # so it doesn't rely solely on the sparse terminal bonus to find the gate.
  # Sum telescopes to k_progress·(spawn_dist − final_dist) → potential-based
  # (doesn't bias the path); the speed incentive still comes from the
  # discount + the uncapped terminal time_factor. At k_progress=1.0 a 6 m
  # approach contributes ~6 reward total vs success_bonus≈100 — a meaningful
  # dense guide that the terminal still dominates. Per step at 10 m/s closing
  # that's ~0.1/step, ~20× the other per-step shaping terms (intended: it
  # should be the primary dense signal). Set 0 to disable.
  k_progress: 1.0
  success_bonus: 100.0   # terminal, scaled by center_factor · time_factor
                         # (see drone_goal_env.py _observe_step). The
                         # speed factor and the body-yaw alignment factor
                         # were removed — the new shape pays for "reach
                         # the gate center fast".
  center_factor_min: 0.5 # Floor for the centering factor: an inner-edge
                         # crossing earns this share (center → 1.0,
                         # edge → center_factor_min) instead of dropping to
                         # 0. At 0.8 the centering multiplier only swings 20%
                         # (0.8→1.0), so it's a gentle nudge toward dead-centre
                         # while the time_factor (0.1→3.0, a 30× swing) is the
                         # dominant driver — the policy is meant to optimise
                         # SPEED first and centre only when ~free (e.g. bank
                         # through from the side rather than waste time
                         # aligning). Lower it toward 0.5/0.0 to make centring
                         # matter more again; 1.0 = centring irrelevant.
  # Distance-aware, UNBOUNDED-above speed factor for the terminal bonus.
  # The factor is the average crossing speed expressed in units of
  # `ref_speed`, so going faster always pays more with no upper cap —
  # ref_speed is just where the factor equals 1.0, not a ceiling:
  #     ref_steps   = max(time_target_min,
  #                       initial_dist / ref_speed · control_hz)
  #     time_factor = max(time_factor_min, ref_steps / steps_taken)
  #                 = max(time_factor_min, avg_speed / ref_speed)
  # Behaviour (with ref_speed=10 m/s at control_hz=100):
  #   spawn 10 m, cross in 1.0 s (10 m/s avg) → 1.00
  #   spawn 10 m, cross in 0.5 s (20 m/s avg) → 2.00   ← faster pays more
  #   spawn 10 m, cross in 2.0 s ( 5 m/s avg) → 0.50
  #   spawn  4 m, cross in 0.13 s (30 m/s avg) → 3.00
  # Scaling by initial_dist keeps it fair across spawns (far spawns aren't
  # hopeless, near spawns can't lazy-hover). The factor is bounded only by
  # physics — the drone can't cross in fewer steps than the distance and
  # its top speed allow.
  #
  # time_factor_min keeps a small reward for slow-but-successful crossings
  # so the policy never prefers crashing over a slow arrival.
  #
  # time_factor_exp steepens the speed ratio: time_factor = (avg_speed /
  # ref_speed) ** time_factor_exp (before the floor). exp>1 rewards fast
  # crossings super-linearly AND penalises slow ones harder — e.g. at
  # exp=1.5: 2× ref_speed → 2.83 (was 2.0), 0.5× ref_speed → 0.35 (was
  # 0.5). exp=1.0 is the plain linear ratio.
  #
  # time_factor_max (OPTIONAL, absent below = uncapped): set a number to
  # re-introduce a soft ceiling if the uncapped variance destabilizes
  # value learning. e.g. `time_factor_max: 3.0` caps the bonus at 3×.
  ref_speed:       10.0    # m/s, speed at which time_factor == 1.0 (NOT a cap)
  time_factor_exp:  1.5    # >1 rewards fast / penalises slow super-linearly
  time_target_min:   20    # env steps; floor on ref_steps for near spawns
                           # (at 100 Hz = 0.2 s; stops a tiny spawn distance
                           # from making the unit reference degenerate)
  time_factor_min:  0.1    # floor so a slow crossing still earns 0.1 · bonus
  time_factor_max:  3.0    # cap the speed multiplier: an uncapped time_factor
                           # rewards unbounded dive speed, which drives reckless
                           # overshoot/frame-clipping near the gate. 3.0 still
                           # pays 3× for a 3×-ref_speed crossing but stops the
                           # variance blowup. Comment out to go uncapped again.
  oob_penalty: 50.0      # workspace OOB (drone leaves the box relative to target)
  crash_penalty: 5.0     # gate frame hit OR entering inner square from behind (-target_yaw)

# Gate frame geometry (mirrors the PnP corner layout). Success fires when
# the drone crosses the gate plane *through the inner square*. Crash (treated
# as OOB) fires when it crosses through the annular frame (between inner and
# outer edges).
gate:
  size_interior: 1.5    # m, square opening side length
  size_exterior: 2.7    # m, square frame outer side length
  depth_tol: 0.3        # m, "at the gate plane" threshold. Must exceed
                        # v_max · dt / 2 so the cross is detected per step.
  # Success-arming radius. A gate-plane terminal (success or crash) can
  # only fire after the drone has been seen at least this far (3D) from the
  # gate center since the last reset. Blocks phantom step-0 successes from
  # the stale at-the-gate pose that lingers before a teleport propagates
  # through the pose pipeline. Must sit between the gate footprint
  # (~size_exterior/2 = 1.35 m) and min_init_target_dist (4.0 m) so every
  # real approach arms it but the at-gate stale pose never does.
  success_arm_radius: 2.0  # m

episode:
  max_steps: 3000        # 30 s at 100 Hz (was 1500 at 50 Hz)
