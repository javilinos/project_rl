/**:
  ros__parameters:
    multirotor:
      dynamics:
        model:
          gravity: [0.0, 0.0, -9.81] # m/s^2
          vehicle_mass: 0.966 # kg
          # Inertia tuned so k_f*arm/I matches their MonoRace mixer k_p/k_q
          # (roll ~4.36e-5, pitch ~2.28e-5): their drone is pitch-stiff
          # (pitch authority ~= half roll). Was [3.5277e-3, 4.5529e-3, ...],
          # nearly roll/pitch-symmetric, which made the policy over-pitch and
          # sag. Ixx = k_f*y_dist/k_p_avg, Iyy = k_f*x_dist/k_q_avg.
          vehicle_inertia: [4.164e-3, 9.010e-3, 5.4071e-3] # kg*m^2 (Ixx, Iyy, Izz)
          vehicle_drag_coefficient: 0.0 # disabled; replaced by anisotropic body_quadratic_drag below
          rotor_drag_coefficient: 5.37e-5 # N/((m/s)·(rad/s)) = their k_x (rotor-coupled linear drag)
          # their k_x2 (fwd), k_y2 (lat); z restored for vertical damping (the
          # known-good 5-gate value). Streamlined forward / draggy sideways.
          body_quadratic_drag: [0.0041, 0.0151, 0.0093] # N/(m/s)^2 per body axis
          # MonoRace thrust aero-droop. DISABLED for now (radius 0): at full
          # nominal the k_hor*mu term adds +45-80% thrust at race speed, which
          # balloons our (not-perfectly-matched) plant -> parabola+slam. Nominal
          # values kept here for reference; re-enable gently (see notes).
          thrust_k_angle: 3.12514 # their k_angle
          thrust_k_hor: 7.225 # their k_hor
          thrust_aero_radius: 0.0 # 0 disables droop; nominal = 0.0485775 (0.12954*0.75/2)
          vehicle_aero_moment_coefficient: [0.003, 0.003, 0.003] # Nm/(rad/s)^2
          force_process_noise_auto_correlation: 0.0 # (N/(rad/s)^2)^2
          moment_process_noise_auto_correlation: 0.0 # (Nm/(rad/s)^2)^2
          motors_params:
            thrust_coefficient: 1.55e-06 # N/(rad/s)^2 = their k_w (was 1.4973e-6, ~3% low)
            torque_coefficient: 2.1238e-8 # Nm/(rad/s)^2
            min_speed: 341.75 # rad/s
            max_speed: 3100.0 # rad/s
            time_constant: 0.03 # s = their tau (was 0.025)
            rotational_inertia: 1.75e-6 # kg*m^2
            x_dist: 0.132248 # m  = (0.143513952 + 0.120981735) / 2
            y_dist: 0.117003 # m  = (0.104268989 + 0.129737027) / 2
            motors_x: [0.143513952, -0.120981735, 0.143513952, -0.120981735]
            motors_y: [-0.104268989, 0.129737027, 0.104268989, -0.129737027]
            motors_direction: [-1.0, -1.0, 1.0, 1.0]
      controller:
        indi:
          kp: [14.875, 14.875, 16.25]
          ki: [1.95, 1.95, 2.25]
          kd: [2.25, 2.25, 0.0]
          alpha: [0.37775, 0.37775, 0.65844]
          antiwindup_cte: [1.0, 1.0, 1.0]
          angular_acceleration_limit: [0.0, 0.0, 0.0] # rad/s^2
        acro:
          kp_rot: [20.0, 20.0, 8.0]
        trajectory:
          kp: [10.0, 10.0, 10.0]
          ki: [0.005, 0.005, 0.005]
          kd: [6.0, 6.0, 6.0]
          alpha: [0.6, 0.6, 0.6]
          antiwindup_cte: [1.0, 1.0, 1.0]
          linear_acceleration_limit: [0.0, 0.0, 0.0] # m/s^2
        velocity:
          kp: [6.0, 6.0, 10.0]
          ki: [1.0, 1.0, 2.0]
          kd: [0.4, 0.4, 0.0]
          alpha: [0.05, 0.05, 0.0]
          antiwindup_cte: [1.0, 1.0, 1.0]
          linear_acceleration_limit: [4.0, 4.0, 4.0] # m/s^2
        position:
          kp: [1.0, 1.0, 1.0]
          ki: [0.01, 0.01, 0.01]
          kd: [0.0, 0.0, 0.0]
          alpha: [0.1, 0.1, 0.0]
          antiwindup_cte: [0.5, 0.5, 0.5]
          linear_velocity_limit: [10.0, 10.0, 10.0] # m/s
      imu:
        gyro_noise_var: 0.0 # rad/s
        accel_noise_var: 0.0 # m/s^2
        gyro_bias_noise_autocorr_time: 0.0 # s
        accel_bias_noise_autocorr_time: 0.0 # s
      inertial_odometry:
        alpha: 1.0
